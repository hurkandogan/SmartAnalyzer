name: Deploy Metrixfolio

on:
  push:
    paths:
      - 'metrixfolio/**'
    branches:
      - main
      - master
  
  workflow_dispatch:
    inputs:
      deploy_frontend:
        description: 'Deploy Metrixfolio?'
        type: boolean
        default: true

env:
  GCP_PROJECT_ID: '${{ secrets.GCP_PROJECT_ID }}'
  GCP_SA_KEY: '${{ secrets.FIREBASE_SA_KEY }}'

jobs:
  deploy-metrixfolio:
    name: Deploy metrixfolio to Firebase App Hosting
    runs-on: ubuntu-latest

    if: |
      (github.event_name == 'workflow_dispatch' && inputs.deploy_frontend == true) ||
      (github.event_name == 'push')

    permissions:
      contents: 'read'
      id-token: 'write'
      
    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SA_KEY }}'

      - name: Deploy metrixfolio to App Hosting
        run: |
          cd metrixfolio
          success=false
          for i in {1..3}; do
            echo "Attempt $i of 3: Deploying to Firebase App Hosting..."
            if npx -y firebase-tools deploy --project=${{ secrets.GCP_PROJECT_ID }} --only apphosting:metrixfolio; then
              success=true
              break
            fi
            echo "Warning: Attempt $i failed with a transient error. Retrying in 20 seconds..."
            sleep 20
          done
          if [ "$success" = false ]; then
            echo "Error: Deployment failed after 3 attempts."
            exit 1
          fi
