name: Deploy Metrixfolio

on:
  push:
    paths:
      - 'metrixfolio/**'
    branches:
      - main
      - master
  
  workflow_dispatch:
    inputs:
      deploy_frontend:
        description: 'Deploy Metrixfolio?'
        type: boolean
        default: true

env:
  GCP_PROJECT_ID: '${{ secrets.GCP_PROJECT_ID }}'
  GCP_SA_KEY: '${{ secrets.FIREBASE_SA_KEY }}'

jobs:
  deploy-metrixfolio:
    name: Deploy metrixfolio to Firebase App Hosting
    runs-on: ubuntu-latest

    if: |
      (github.event_name == 'workflow_dispatch' && inputs.deploy_frontend == true) ||
      (github.event_name == 'push')

    permissions:
      contents: 'read'
      id-token: 'write'
      
    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy metrixfolio to App Hosting
        run: |
          cd metrixfolio
          firebase deploy --project=${{ secrets.GCP_PROJECT_ID }} --only apphosting:metrixfolio --token ${{ secrets.FIREBASE_TOKEN }}
